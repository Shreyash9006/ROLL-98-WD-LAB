<!DOCTYPE html>
<html>
<head>
    <title>Grocery Table</title>

    <style>
        table {
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>

</head>

<body>

<h2>Grocery Bill</h2>

<table>

<tr>
    <th>Sr No</th>
    <th>Item Name</th>
    <th>Cost</th>
</tr>

<tr>
    <td>1</td>
    <td>Rice</td>
    <td>50</td>
</tr>

<tr>
    <td>2</td>
    <td>Milk</td>
    <td>30</td>
</tr>

<tr>
    <td>3</td>
    <td>Bread</td>
    <td>25</td>
</tr>

<tr>
    <td>4</td>
    <td>Sugar</td>
    <td>40</td>
</tr>

<tr>
    <td colspan="2"><b>Total</b></td>
    <td><b>145</b></td>
</tr>

</table>

</body>
</html>
