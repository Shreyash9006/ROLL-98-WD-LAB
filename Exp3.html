<!DOCTYPE html>
<html>
<head>
<title>Text Formatting in Paragraph</title>
</head>

<body>

<p>
This is a <b>bold</b> word, this is <i>italic</i>, and this is 
<u>underlined</u>. 

This is <strong>important text</strong> and this is 
<em>emphasized text</em>. 

This is <mark>highlighted text</mark>, this is <small>small text</small>, 
and this is <del>deleted text</del> and <ins>inserted text</ins>. 

Water formula is H<sub>2</sub>O and math formula is X<sup>2</sup>.
</p>

</body>
</html>
