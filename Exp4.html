<!DOCTYPE html>
<html>
<head>
    <title>List Tags Example</title>
</head>

<body>

<h2>Unordered List (Fruits)</h2>
<ul type="circle">
    <li>Apple</li>
    <li>Mango</li>
    <li>Banana</li>
</ul>

<h2>Ordered List (Steps)</h2>
<ol type="1">
    <li>Wake up</li>
    <li>Brush teeth</li>
    <li>Go to college</li>
</ol>

<h2>Description List</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
</dl>

<h2>Nested List</h2>
<ul>
    <li>Fruits
        <ul>
            <li>Apple</li>
            <li>Mango</li>
        </ul>
    </li>
</ul>

</body>
</html>
