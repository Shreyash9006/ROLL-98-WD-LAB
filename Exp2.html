<!DOCTYPE html>
<html>

<head>
    <title>Static Web Page</title>

    <style>
        body {
            background-color: lightyellow;
            font-family: Arial;
        }

        h1 {
            color: darkred;
            text-align: center;
        }

        h2 {
            color: blue;
        }

        p {
            font-size: 16px;
            color: black;
        }

        hr {
            border: 2px solid gray;
        }
    </style>

</head>

<body>

    <h1>Welcome to My Web Page</h1>

    <h2>About Me</h2>
    <p>This is a static web page created using HTML tags.</p>

    <hr>

    <h2>My Hobbies</h2>
    <p>Reading<br>Playing<br>Coding</p>

    <hr>

    <h2>Contact</h2>
    <p>Email: example@gmail.com</p>

</body>

</html>
